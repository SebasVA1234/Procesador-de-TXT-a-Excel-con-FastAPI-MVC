<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Procesador de TXT · Ecualand</title>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
  <div class="container">
    <h1>Procesador de Archivos TXT</h1>
    <p id="saludo" class="saludo"></p>

    <!-- Se muestra si no hay sesión válida de Helper -->
    <div id="auth-needed" style="display:none">
      <p>🔒 Para usar esta herramienta necesitás iniciar sesión en <strong>Helper Ecualand</strong> y abrirla desde ahí.</p>
      <p><a id="helper-link" href="#">Ir a Helper Ecualand →</a></p>
    </div>

    <!-- Formulario (se muestra solo con sesión válida) -->
    <form id="formulario" enctype="multipart/form-data" style="display:none">
      <label for="tipo">Tipo de archivo:</label>
      <select id="tipo" name="tipo">
        <option value="pagos">Pagos a proveedores</option>
        <option value="compras">Compras (orden)</option>
      </select>

      <label for="archivo">Seleccionar archivo TXT:</label>
      <input type="file" id="archivo" name="file" accept=".txt" required>

      <button type="submit">Procesar y Descargar Excel</button>
      <p id="mensaje" class="mensaje"></p>
    </form>
  </div>

  <script>
    // URL de Helper para volver a loguearse si no hay sesión.
    const HELPER_URL = "https://powerbi-report-viewer-production.up.railway.app/";

    // 1) Tomar el token del fragment (#token=...) que pone el botón de Helper.
    //    El fragment NO viaja al servidor; lo lee solo el navegador.
    (function grabToken() {
      const m = (location.hash || "").match(/token=([^&]+)/);
      if (m) {
        sessionStorage.setItem("helper_token", decodeURIComponent(m[1]));
        // Limpiar el hash para no dejar el token en la barra/historial.
        history.replaceState(null, "", location.pathname + location.search);
      }
    })();
    const getToken = () => sessionStorage.getItem("helper_token");
    const authHeaders = () => getToken() ? { "Authorization": "Bearer " + getToken() } : {};

    const $ = (id) => document.getElementById(id);

    // 2) Confirmar la sesión contra /api/me y mostrar u ocultar el formulario.
    async function checkAuth() {
      try {
        const r = await fetch("/api/me", { headers: authHeaders() });
        if (!r.ok) throw new Error();
        const u = await r.json();
        $("saludo").textContent = "👤 " + (u.full_name || u.username || "Usuario");
        $("formulario").style.display = "";
        $("auth-needed").style.display = "none";
        return true;
      } catch {
        $("saludo").textContent = "";
        $("formulario").style.display = "none";
        $("auth-needed").style.display = "";
        $("helper-link").href = HELPER_URL;
        return false;
      }
    }
    checkAuth();

    // 3) Envío del archivo con el Bearer de Helper.
    $("formulario").addEventListener("submit", async function (e) {
      e.preventDefault();
      const archivo = $("archivo").files[0];
      const tipo = $("tipo").value;

      if (!archivo || !archivo.name.endsWith(".txt")) {
        $("mensaje").textContent = "❌ Debes subir un archivo .txt válido.";
        return;
      }

      const formData = new FormData();
      const prefijo = tipo === "pagos" ? "pagos_" : "compras_";
      const renamedFile = new File([archivo], prefijo + archivo.name, { type: archivo.type });
      formData.append("file", renamedFile);
      $("mensaje").textContent = "⏳ Procesando...";

      try {
        const response = await fetch("/procesar", {
          method: "POST",
          body: formData,
          headers: authHeaders(),
        });

        if (response.status === 401 || response.status === 503) {
          $("mensaje").textContent = "🔒 Tu sesión venció. Volvé a abrir esta herramienta desde Helper Ecualand.";
          checkAuth();
          return;
        }
        if (!response.ok) throw new Error();

        const blob = await response.blob();
        const url = window.URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.href = url;
        a.download = "archivo_procesado.xlsx";
        a.click();
        window.URL.revokeObjectURL(url);

        $("mensaje").textContent = "✅ Archivo procesado y descargado.";
      } catch {
        $("mensaje").textContent = "❌ Hubo un error al procesar el archivo.";
      }
    });
  </script>
</body>
</html>
